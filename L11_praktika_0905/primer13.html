<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>order of fields in a field</title>
    <style>
        fieldset {
        width: 200px;
        padding: 0 10px;
        }
        fieldset:nth-child(odd) {
        float: left;
        }
    </style>
</head>
<body>
<form>
    <fieldset>
        <p>name:</p>
        <p><input name="name" tabindex="1"></p>
    </fieldset>
    <fieldset>
        <p>family:</p>
        <p><input type="tel" name="tel" tabindex="2"></p>
    </fieldset>
    <fieldset>
        <p>pol:</p>
        <p><select name="gender" tabindex="4">
            <option selected>man</option>
            <option>woman</option>
        </select></p>
    </fieldset>
</form>
</body>
</html>
