<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>forms</title>
</head>
<body>
<form name="formal">
    Which languages do you want to study?<br>
    <select name="language" size="1">
        <option value="php">php
        <option value="java">java
    </select><br><br>
    how much time are you willing to spend on this<br>
    <select name="time" size="3">
        <option value="2">2 months
        <option value="3">3 months
    </select><br><br>
    which days of the week suit you (select with ctrl)<br>
    <select name="day" size="7">
        <option selected value="mon">mon
        <option value="tue">tue
        <option value="wen">wen
        <option selected value="thu">thu
        <option value="fri">fri
        <option value="sat">sat
        <option value="san">san
    </select><br><br>
</form>
</body>
</html>
